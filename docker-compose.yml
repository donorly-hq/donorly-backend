services:
  postgres:
    image: postgres:16
    container_name: donorly-postgres
    environment:
      POSTGRES_DB: donorly
      POSTGRES_USER: donorly
      POSTGRES_PASSWORD: donorly
    ports:
      - "5432:5432"
    volumes:
      - donorly_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donorly -d donorly"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  donorly_pgdata:
