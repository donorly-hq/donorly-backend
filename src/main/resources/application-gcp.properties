# GCP Cloud Run profile
# All sensitive values come from Secret Manager (injected as env vars by Cloud Run)
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# HikariCP — tuned for Cloud Run cold starts and Railway proxy
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000

# Actuator — expose health for Cloud Run health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
