spring.application.name=donorly-backend
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool — keeps connections alive through Railway's idle timeout
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Schema is owned by Flyway migrations; Hibernate only validates the mapping.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

jwt.secret=${JWT_SECRET}

# Email (Google Workspace / Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
donorly.mail.from-address=${MAIL_USERNAME}
donorly.mail.from-name=${MAIL_FROM_NAME:Donorly}
donorly.mail.app-base-url=${APP_BASE_URL:http://localhost:3000}

# AI configuration — set OPENAI_API_KEY to enable real AI responses.
# When the key is empty, the service runs in stub mode (no API calls).
donorly.ai.openai-api-key=${OPENAI_API_KEY:}
donorly.ai.model=${OPENAI_MODEL:gpt-4o-mini}

# Default super admin bootstrap (used only on an empty database).
# When the password is unset, an unrecoverable random password is set (never logged);
# use the forgot-password flow to establish the real password.
donorly.bootstrap.enabled=true
donorly.bootstrap.super-admin-email=${DONORLY_SUPERADMIN_EMAIL:admin@donorly.org}
donorly.bootstrap.super-admin-password=${DONORLY_SUPERADMIN_PASSWORD:}
donorly.bootstrap.default-org-name=Jamia Masjid Chicago
donorly.bootstrap.default-org-slug=jamia-masjid-chicago
# Demo logins (known password) are OFF by default. Only enable in non-production demos.
donorly.bootstrap.seed-demo=${DONORLY_SEED_DEMO:false}

# CORS — comma-separated extra allowed origins (set via env var in production)
donorly.cors.extra-origins=${DONORLY_CORS_EXTRA_ORIGINS:}

# Org logo storage — GCS bucket (optional; DB fallback when unset)
donorly.storage.gcs-bucket=${DONORLY_GCS_BUCKET:}
