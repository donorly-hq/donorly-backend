# Test configuration. This file SHADOWS the main application.properties on the test
# classpath (target/test-classes precedes target/classes), so everything required must
# be declared here. The datasource is injected by IntegrationTestBase from Testcontainers.

spring.application.name=donorly-backend
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Base64 of a throwaway 52-byte HMAC key. Tests only.
jwt.secret=YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXphYmNkZWZnaGlqa2xtbm9wcXJzdHV2d3h5eg==

# Mail: never sends in tests; host is set so the JavaMailSender bean can be created.
spring.mail.host=localhost
spring.mail.port=3025
donorly.mail.from-address=test@donorly.org
donorly.mail.from-name=Donorly Test
donorly.mail.app-base-url=http://localhost:3000

# AI runs in stub mode (no key, no API calls).
donorly.ai.openai-api-key=
donorly.ai.model=gpt-4o-mini

# Seed permissions/roles (needed to build memberships) but never demo accounts.
donorly.bootstrap.enabled=true
donorly.bootstrap.seed-demo=false
donorly.bootstrap.super-admin-email=admin@test.donorly.org
donorly.bootstrap.super-admin-password=
donorly.bootstrap.default-org-name=Test Org
donorly.bootstrap.default-org-slug=test-org

donorly.cors.extra-origins=
